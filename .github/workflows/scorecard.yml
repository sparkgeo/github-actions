name: OpenSSF Scorecard

on:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read        # read workflow files for dangerous-workflow check
      security-events: write  # upload SARIF to GitHub Security tab
      id-token: write      # sign and publish results to OpenSSF database (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # publish_results: true uploads to the public OpenSSF Scorecard database and
          # generates the Scorecard badge. Only works on public repos.
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        if: always()
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
