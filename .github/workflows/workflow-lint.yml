name: Workflow Lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  # Intentionally zero-input: callers get the same lint gate with no configuration.
  # Pin this workflow at a SHA in calling workflows for supply-chain safety.
  workflow_call:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
        with:
          github_token: ${{ github.token }}
          reporter: github-check
          fail_level: error

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install zizmor
        shell: bash
        run: pip install --require-hashes -r requirements/lint.txt

      - name: Run zizmor
        shell: bash
        run: zizmor --format sarif . > zizmor-results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        if: always()
        # continue-on-error: security-events: write is unavailable on fork PRs (403);
        # the zizmor step above already exits non-zero on findings so the gate still holds.
        continue-on-error: true
        with:
          sarif_file: zizmor-results.sarif
