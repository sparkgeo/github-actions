name: Actions Quality Gate
# Lints and security-scans all workflow and composite action YAML files using actionlint and zizmor.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  # Intentionally zero-input: callers get the same lint gate with no configuration.
  # Pin this workflow at a SHA in calling workflows for supply-chain safety.
  workflow_call:

permissions:
  contents: read

jobs:
  # Validates workflow and action YAML syntax and logic using actionlint.
  # Posts findings as GitHub Check annotations visible in the PR checks tab.
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
        with:
          github_token: ${{ github.token }}
          reporter: github-check
          fail_level: error

  # Runs zizmor static security analysis against workflow and action YAML files.
  # Uploads findings as SARIF to the GitHub Security tab for triage and tracking.
  zizmor:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          version: "1.25.2"
          advanced-security: "true"
        env:
          GITHUB_TOKEN: ${{ github.token }}
