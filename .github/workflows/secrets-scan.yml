name: Secrets PR Scan

# Reusable CI gate that runs TruffleHog on a PR to confirm whether any matched
# credential is a live, verified secret before blocking the merge. The PR-stage
# counterpart to secrets-precommit.yml (gitleaks, issue #23).
#
# Deliberately does NOT use step-security/harden-runner: this workflow runs in
# the caller's context and may be consumed by private repos where third-party
# CI telemetry is not acceptable. See docs/approved-actions.md.

on:
  workflow_call:
    inputs:
      only-verified:
        description: 'Only hard-fail on verified active secrets (reduces false positives)'
        default: true
        type: boolean
      sarif-upload:
        description: 'Upload SARIF results to the GitHub Security tab'
        default: true
        type: boolean
      actions-ref:
        description: >-
          Ref or commit SHA of sparkgeo/github-actions to load the trufflehog
          composite from. Pin this to the SAME SHA you pinned secrets-scan.yml
          to, so the whole workflow is immutable.
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # SARIF upload to the Security tab
    steps:
      - name: Checkout repository under test
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # full history so the PR commit range can be scanned

      # Load the composite action at the caller-pinned ref into a fixed path,
      # then invoke it locally. Keeps the action reference immutable (no mutable
      # cross-repo @main) while honouring the repo's SHA-pin policy.
      - name: Checkout trufflehog composite action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: sparkgeo/github-actions
          ref: ${{ inputs.actions-ref }}
          path: .sparkgeo-github-actions
          persist-credentials: false

      - uses: ./.sparkgeo-github-actions/.github/actions/trufflehog
        with:
          only-verified: ${{ inputs.only-verified }}
          sarif-upload: ${{ inputs.sarif-upload }}
