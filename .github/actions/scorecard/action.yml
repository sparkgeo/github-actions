name: "OpenSSF Scorecard"
description: |
  Runs OpenSSF Scorecard checks and uploads SARIF to the GitHub Security tab.
  Required permissions on calling job: security-events: write, actions: read, contents: read

  WARNING — publish_results: this input is a known footgun. The OpenSSF scorecard webapp
  verifies that the calling workflow directly invokes ossf/scorecard-action as a job step.
  Composite action wrapping hides that call. Setting publish_results: true will ALWAYS fail
  with HTTP 400 "workflow has no job that calls ossf/scorecard-action". The default is false
  and should remain false. To publish to the OpenSSF public database, call
  ossf/scorecard-action directly in your workflow instead of using this composite action.
inputs:
  publish_results:
    description: |
      WARNING: always fails with HTTP 400 when set to true. The scorecard webapp cannot see
      through composite action wrapping to verify the ossf/scorecard-action call. Keep false
      (default). To actually publish, call ossf/scorecard-action directly in your workflow.
    default: "false"
runs:
  using: "composite"
  steps:
    - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
      with:
        results_file: scorecard-results.sarif
        results_format: sarif
        repo_token: ${{ github.token }}
        publish_results: ${{ inputs.publish_results }}

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: always()
      with:
        name: scorecard-results
        path: scorecard-results.sarif
        retention-days: 5
        if-no-files-found: ignore

    - name: Print scorecard summary
      if: always() && hashFiles('scorecard-results.sarif') != ''
      shell: bash
      run: |
        echo "=== OpenSSF Scorecard Results ==="
        findings=$(jq -r '
          .runs[].results[]? |
          "  [\(.ruleId | gsub("ID$";""))] \(.message.text | split("\n")[0])"
        ' scorecard-results.sarif)
        if [[ -z "$findings" ]]; then
          echo "  All checks passed"
        else
          echo "$findings"
        fi

    - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
      if: always() && hashFiles('scorecard-results.sarif') != ''
      with:
        sarif_file: scorecard-results.sarif
        category: scorecard
