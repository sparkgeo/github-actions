name: "OpenSSF Scorecard"
description: |
  Runs OpenSSF Scorecard checks and uploads SARIF to the GitHub Security tab.
  Required permissions on calling job: id-token: write, security-events: write, actions: read, contents: read

  NOTE: publish_results defaults to false. The scorecard webapp verifies that the
  calling workflow directly invokes ossf/scorecard-action as a job step. Composite
  action wrapping hides that call, so publication always fails with a 400 error.
  To publish to the OpenSSF database, call ossf/scorecard-action directly in your
  workflow instead of using this composite action.
inputs:
  publish_results:
    description: "Publish results to the public OpenSSF Scorecard database. Only works when ossf/scorecard-action is called directly (not via a composite action). See action description."
    default: "false"
runs:
  using: "composite"
  steps:
    - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
      with:
        results_file: scorecard-results.sarif
        results_format: sarif
        repo_token: ${{ github.token }}
        publish_results: ${{ inputs.publish_results }}

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: always()
      with:
        name: scorecard-results
        path: scorecard-results.sarif
        retention-days: 5
        if-no-files-found: ignore

    - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
      if: always() && hashFiles('scorecard-results.sarif') != ''
      with:
        sarif_file: scorecard-results.sarif
        category: scorecard
